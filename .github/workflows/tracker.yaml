name: YouTube Playlist Tracker

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            /*
            !**/*.webm
            !**/*.jpg
            !**/thumbnails/**
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install google-api-python-client yt-dlp requests PySocks

      - name: Configure Git for Python
        run: |
          git config user.name "HauseMasterZ"
          git config user.email "113833707+HauseMasterZ@users.noreply.github.com"
          git lfs install

      - name: Run tracker and download audio
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -u youtube_playlist.py
