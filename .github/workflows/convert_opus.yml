name: Convert Opus to WebM Losslessly

on:
  workflow_dispatch:

jobs:
  remux-audio:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run conversion script
        run: python remux_to_webm.py

      - name: Commit and push changes
        run: |
          git config --global user.name "HauseMasterZ"
          git config --global user.email "113833707+HauseMasterZ@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Losslessly remux .opus files to .webm container" && git push)
